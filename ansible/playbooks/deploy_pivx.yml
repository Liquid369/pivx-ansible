---
# playbooks/deploy_pivx.yml
# Installs PIVX binary and deploys per-instance configs + systemd units.
# Can be run against all hosts or a subset via --limit.

- name: Install PIVX binary on all PIVX-running hosts
  hosts: masternodes:seeders:observers
  become: true
  gather_facts: true
  serial: 5         # rolling install 5 at a time to avoid thundering-herd downloads

  roles:
    - pivx_install

- name: Deploy PIVX instances
  hosts: masternodes:seeders:observers
  become: true
  gather_facts: true

  tasks:
    - name: Deploy each PIVX instance
      ansible.builtin.include_role:
        name: pivx_instance
      vars:
        instance: "{{ item }}"
      loop: "{{ pivx_instances }}"
      when: item.enabled | default(true)
      loop_control:
        label: "{{ item.name }}"
