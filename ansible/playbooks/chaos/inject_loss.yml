---
# playbooks/chaos/inject_loss.yml
#
# Usage:
#   make chaos-inject-loss COHORT=tor LOSS=5
#
#   ansible-playbook -i ansible/inventories/testnet6 \
#     ansible/playbooks/chaos/inject_loss.yml \
#     -e "target_cohort=tor netem_loss_percent=5%"
#
# Vars:
#   netem_loss_percent : e.g. "5%" or "10%"  (default from tc_netem defaults)
#   netem_interface    : e.g. "eth0"          (default: auto-detect)

- name: Inject packet loss on {{ target_cohort | default('ipv4') }} cohort hosts
  hosts: "cohort_{{ target_cohort | default('ipv4') }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Validate cohort
      ansible.builtin.assert:
        that: (target_cohort | default('ipv4')) in ['ipv4', 'ipv6', 'tor']
        msg: "target_cohort must be one of: ipv4, ipv6, tor"

    - name: Warn about host-level netem scope
      ansible.builtin.debug:
        msg: >
          netem is applied to the selected hosts' primary network interface.
          Because Testnet6 hosts are mixed-protocol, this affects all traffic on
          these hosts, not only {{ target_cohort | default('ipv4') }} PIVX instances. Use
          cohort-stop/cohort-start for precise protocol isolation.

    - name: Log chaos event
      ansible.builtin.lineinfile:
        path: /var/log/pivx/chaos.log
        line: >-
          {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }} CHAOS inject_loss
          cohort={{ target_cohort | default('ipv4') }}
          loss={{ netem_loss_percent | default('5%') }}
          host={{ inventory_hostname }}
        create: true
        mode: "0640"
      ignore_errors: true

  tasks:
    - name: Apply packet loss via tc_netem role
      ansible.builtin.include_role:
        name: tc_netem
        tasks_from: inject_loss.yml
