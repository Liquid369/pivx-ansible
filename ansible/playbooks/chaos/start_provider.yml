---
# playbooks/chaos/start_provider.yml

- name: Start all PIVX instances on {{ target_provider | default('contabo') }} hosts
  hosts: "provider_{{ target_provider | default('contabo') }}"
  become: true
  gather_facts: false

  pre_tasks:
    - name: Validate target_provider
      ansible.builtin.assert:
        that: (target_provider | default('contabo')) in ['contabo', 'ovh']
        msg: "target_provider must be contabo or ovh"

  tasks:
    - name: Start all PIVX instances
      ansible.builtin.systemd:
        name: "pivxd@{{ item.name }}.service"
        state: started
      loop: "{{ pivx_instances | default([]) }}"
      when: item.enabled | default(true)
      loop_control:
        label: "{{ item.name }}"

    - name: Log chaos event
      ansible.builtin.lineinfile:
        path: /var/log/pivx/chaos.log
        line: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }} CHAOS start_provider provider={{ target_provider | default('contabo') }} host={{ inventory_hostname }}"
        create: true
        mode: "0640"
      ignore_errors: true
