---
# playbooks/chaos/start_cohort.yml

- name: Start {{ target_cohort | default('ipv4') }} cohort instances
  hosts: masternodes:seeders
  become: true
  gather_facts: false

  pre_tasks:
    - name: Validate target_cohort
      ansible.builtin.assert:
        that: (target_cohort | default('ipv4')) in ['ipv4', 'ipv6', 'tor']
        msg: "target_cohort must be one of: ipv4, ipv6, tor"

    - name: Log chaos event
      ansible.builtin.lineinfile:
        path: /var/log/pivx/chaos.log
        line: >-
          {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }} CHAOS start_cohort cohort={{ target_cohort | default('ipv4') }}
          host={{ inventory_hostname }}
        create: true
        mode: "0640"
      ignore_errors: true

  tasks:
    - name: Start instances in cohort {{ target_cohort | default('ipv4') }}
      ansible.builtin.systemd:
        name: "pivxd@{{ item.name }}.service"
        state: started
      loop: "{{ pivx_instances | selectattr('cohort', 'equalto', target_cohort | default('ipv4')) | list }}"
      when: item.enabled | default(true)
      loop_control:
        label: "{{ item.name }}"
