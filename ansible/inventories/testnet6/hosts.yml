# PIVX Testnet6 — Main Inventory
#
# Naming convention:
#   tn6-<provider_prefix><id>[-<role_hint>]
#
#   Provider prefixes:
#     cb   = Contabo
#     ovh  = OVH/Kimsufi
#
# Host groups:
#   masternodes        - host runs ≥1 masternode instance (mn01–mn36)
#   seeders            - always-online seed/bootstrap nodes
#   bootstrap_miners   - nodes that mine blocks during Phase 2 (seed role)
#   observers          - passive RPC observation nodes
#   monitoring         - infra/observability stack
#
#   provider_contabo   - Contabo-hosted servers
#   provider_ovh       - OVH-hosted servers
#
#   cohort_ipv4/ipv6/tor - hosts with at least one instance of that protocol
#                          (used for netem targeting at host level)
#
# IMPORTANT: Replace all 203.0.113.x and 2001:db8:: addresses with real values.
# These are documentation-range placeholders (RFC 5737 / RFC 3849).

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    chain: testnet6
    pivx_network: testnet

  children:

    # -------------------------------------------------------------------------
    # Functional role groups
    # -------------------------------------------------------------------------
    masternodes:
      hosts:
        tn6-cb1:
          ansible_host: 203.0.113.11
          ansible_user: deploy
        tn6-cb2:
          ansible_host: 203.0.113.12
          ansible_user: deploy
        tn6-cb3:
          ansible_host: 203.0.113.13
          ansible_user: deploy
        tn6-cb4:
          ansible_host: 203.0.113.14
          ansible_user: deploy
        tn6-cb5:
          ansible_host: 203.0.113.15
          ansible_user: deploy
        tn6-cb6:
          ansible_host: 203.0.113.16
          ansible_user: deploy
        tn6-cb7:
          ansible_host: 203.0.113.17
          ansible_user: deploy
        tn6-ovh1:
          ansible_host: 203.0.113.21
          ansible_user: deploy
        tn6-ovh2:
          ansible_host: 203.0.113.22
          ansible_user: deploy
        tn6-ovh3:
          ansible_host: 203.0.113.23
          ansible_user: deploy
        tn6-ovh4:
          ansible_host: 203.0.113.24
          ansible_user: deploy
        tn6-ovh5:
          ansible_host: 203.0.113.25
          ansible_user: deploy

    seeders:
      hosts:
        tn6-seed01:
          ansible_host: 203.0.113.31
          ansible_user: deploy
        tn6-seed02:
          ansible_host: 203.0.113.32
          ansible_user: deploy

    # -------------------------------------------------------------------------
    # Bootstrap miners — seed nodes that also mine during Phase 2.
    # These are the SAME physical hosts as seeders; they run one pivxd instance
    # with mining enabled. Once the chain reaches mining_phase_target_height,
    # run `make stop-bootstrap-mining` to cut mining on these hosts.
    # -------------------------------------------------------------------------
    bootstrap_miners:
      hosts:
        tn6-seed01:
        tn6-seed02:

    observers:
      hosts:
        tn6-infra01:
          ansible_host: 203.0.113.41
          ansible_user: deploy

    monitoring:
      hosts:
        tn6-infra01:  # shares host with observer; see host_vars for role split

    # -------------------------------------------------------------------------
    # Provider groups  (used for provider-level chaos targeting)
    # -------------------------------------------------------------------------
    provider_contabo:
      hosts:
        tn6-cb1:
        tn6-cb2:
        tn6-cb3:
        tn6-cb4:
        tn6-cb5:
        tn6-cb6:
        tn6-cb7:
        tn6-seed01:
        tn6-infra01:

    provider_ovh:
      hosts:
        tn6-ovh1:
        tn6-ovh2:
        tn6-ovh3:
        tn6-ovh4:
        tn6-ovh5:
        tn6-seed02:

    # -------------------------------------------------------------------------
    # Protocol cohort groups
    # All masternode hosts carry all three cohorts.
    # Cohort targeting controls which *instances* are touched via instance-level
    # variables, but netem rules are applied at the host level.
    # -------------------------------------------------------------------------
    cohort_ipv4:
      children:
        masternodes:
        seeders:

    cohort_ipv6:
      children:
        masternodes:

    cohort_tor:
      children:
        masternodes:

    # -------------------------------------------------------------------------
    # Chaos groups — mirror providers for failure injection
    # -------------------------------------------------------------------------
    chaos_contabo:
      children:
        provider_contabo:

    chaos_ovh:
      children:
        provider_ovh:
