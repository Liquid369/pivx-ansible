# PIVX Testnet6 — Active Inventory
#
# Current funded fleet:
#   - 15 Contabo hosts total
#   - tn6-cb1..tn6-cb7   Contabo 4 vCPU class
#   - tn6-cb8..tn6-cb15  Contabo 6 vCPU class
#   - tn6-cb1..tn6-cb3   also run colocated seed/bootstrap-miner instances
#   - tn6-infra01        observer + monitoring
#
# Future expansion:
#   - 10-12 OVH/Kimsufi KS-A hosts are planned when budget allows.
#   - The `provider_ovh` group is intentionally empty until those hosts exist.
#
# Instance layout per masternode host:
#   Slot 0  v4-mn01   IPv4 #1   P2P 51474 / RPC 51478
#   Slot 1  v4-mn02   IPv4 #2   P2P 51484 / RPC 51488
#   Slot 2  v6-mn03   IPv6 #1   P2P 51494 / RPC 51498
#   Slot 3  v6-mn04   IPv6 #2   P2P 51504 / RPC 51508
#   Slot 4  tor-mn05  Tor  #1   P2P 51514 / RPC 51518
#   Slot 5  tor-mn06  Tor  #2   P2P 51524 / RPC 51528
#
# Colocated seed/bootstrap hosts add:
#   Slot 6  seed01/2/3 IPv4     P2P 51534 / RPC 51538
#
# IMPORTANT: Replace all 203.0.113.x and 2001:db8:: addresses with real values.
# These are documentation-range placeholders (RFC 5737 / RFC 3849).

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    chain: testnet6
    pivx_network: testnet

  children:

    # -------------------------------------------------------------------------
    # Functional role groups
    # -------------------------------------------------------------------------
    masternodes:
      hosts:
        # --- Contabo 4 vCPU class (7 hosts) ----------------------------------
        tn6-cb1:
          ansible_host: 203.0.113.11
          ansible_user: deploy
        tn6-cb2:
          ansible_host: 203.0.113.12
          ansible_user: deploy
        tn6-cb3:
          ansible_host: 203.0.113.13
          ansible_user: deploy
        tn6-cb4:
          ansible_host: 203.0.113.14
          ansible_user: deploy
        tn6-cb5:
          ansible_host: 203.0.113.15
          ansible_user: deploy
        tn6-cb6:
          ansible_host: 203.0.113.16
          ansible_user: deploy
        tn6-cb7:
          ansible_host: 203.0.113.17
          ansible_user: deploy

        # --- Contabo 6 vCPU class (8 hosts) ----------------------------------
        tn6-cb8:
          ansible_host: 203.0.113.18
          ansible_user: deploy
        tn6-cb9:
          ansible_host: 203.0.113.19
          ansible_user: deploy
        tn6-cb10:
          ansible_host: 203.0.113.20
          ansible_user: deploy
        tn6-cb11:
          ansible_host: 203.0.113.21
          ansible_user: deploy
        tn6-cb12:
          ansible_host: 203.0.113.22
          ansible_user: deploy
        tn6-cb13:
          ansible_host: 203.0.113.23
          ansible_user: deploy
        tn6-cb14:
          ansible_host: 203.0.113.24
          ansible_user: deploy
        tn6-cb15:
          ansible_host: 203.0.113.25
          ansible_user: deploy

    # Colocated seed/bootstrap instances. These hosts are also masternode hosts.
    seeders:
      hosts:
        tn6-cb1:
        tn6-cb2:
        tn6-cb3:

    bootstrap_miners:
      hosts:
        tn6-cb1:
        tn6-cb2:
        tn6-cb3:

    observers:
      hosts:
        tn6-infra01:
          ansible_host: 203.0.113.41
          ansible_user: deploy

    monitoring:
      hosts:
        tn6-infra01:

    # -------------------------------------------------------------------------
    # Provider groups
    # -------------------------------------------------------------------------
    provider_contabo:
      hosts:
        tn6-cb1:
        tn6-cb2:
        tn6-cb3:
        tn6-cb4:
        tn6-cb5:
        tn6-cb6:
        tn6-cb7:
        tn6-cb8:
        tn6-cb9:
        tn6-cb10:
        tn6-cb11:
        tn6-cb12:
        tn6-cb13:
        tn6-cb14:
        tn6-cb15:
        tn6-infra01:

    provider_ovh:
      hosts: {}

    # -------------------------------------------------------------------------
    # Protocol cohort groups
    # Cohort stop/start targets filter per instance by `cohort`.
    # netem targets are host-level and affect every process on matching hosts.
    # -------------------------------------------------------------------------
    cohort_ipv4:
      children:
        masternodes:
        seeders:

    cohort_ipv6:
      children:
        masternodes:

    cohort_tor:
      children:
        masternodes:

    # -------------------------------------------------------------------------
    # Chaos groups
    # -------------------------------------------------------------------------
    chaos_contabo:
      children:
        provider_contabo:

    chaos_ovh:
      children:
        provider_ovh:
