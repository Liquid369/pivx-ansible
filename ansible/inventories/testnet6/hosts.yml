# PIVX Testnet6 — Main Inventory
#
# Naming convention:
#   tn6-<prefix><id>
#
#   Prefixes:
#     cb          Contabo dedicated servers (MN hosts)
#     rbx         OVH/Kimsufi KS-5, Roubaix, France
#     sbg         OVH/Kimsufi KS-5, Strasbourg, France
#     gra         OVH/Kimsufi KS-5, Gravelines, France
#     bhs         OVH/Kimsufi KS-5, Beauharnois, Canada
#     sgp         OVH/Kimsufi KS-5, Singapore
#     ks-seed     OVH/Kimsufi KS-1, seed/bootstrap nodes
#     infra       Monitoring / observer node
#
# Instance layout per MN host (6 per server):
#   Slot 0  v4-mn01   IPv4 #1   P2P 51474 / RPC 51478
#   Slot 1  v4-mn02   IPv4 #2   P2P 51484 / RPC 51488
#   Slot 2  v6-mn03   IPv6 #1   P2P 51494 / RPC 51498
#   Slot 3  v6-mn04   IPv6 #2   P2P 51504 / RPC 51508
#   Slot 4  tor-mn05  Tor  #1   P2P 51514 / RPC 51518
#   Slot 5  tor-mn06  Tor  #2   P2P 51524 / RPC 51528
#
# Host groups:
#   masternodes        hosts running ≥1 masternode instance
#   seeders            always-online seed / bootstrap nodes
#   bootstrap_miners   seeders that also mine during Phase 2
#   observers          passive RPC observation node(s)
#   monitoring         Prometheus + Grafana stack
#
#   provider_contabo   all Contabo-hosted servers
#   provider_kimsufi   all OVH/Kimsufi-hosted servers
#
#   cohort_ipv4/ipv6/tor  all hosts carrying that protocol class
#                          (used for netem chaos targeting at the host level)
#
# IMPORTANT: Replace all 203.0.113.x and 2001:db8:: addresses with real values.
# These are documentation-range placeholders (RFC 5737 / RFC 3849).
#
# Deployer note:
#   The Ansible control node (dedicated small VPS) is NOT a managed target and
#   does not appear in this inventory. Run playbooks from that host directly.

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    chain: testnet6
    pivx_network: testnet

  children:

    # -------------------------------------------------------------------------
    # Functional role groups
    # -------------------------------------------------------------------------
    masternodes:
      hosts:
        # --- Contabo (8 hosts, cb8 is a spare/expansion placeholder) ----------
        tn6-cb1:
          ansible_host: 203.0.113.11
          ansible_user: deploy
        tn6-cb2:
          ansible_host: 203.0.113.12
          ansible_user: deploy
        tn6-cb3:
          ansible_host: 203.0.113.13
          ansible_user: deploy
        tn6-cb4:
          ansible_host: 203.0.113.14
          ansible_user: deploy
        tn6-cb5:
          ansible_host: 203.0.113.15
          ansible_user: deploy
        tn6-cb6:
          ansible_host: 203.0.113.16
          ansible_user: deploy
        tn6-cb7:
          ansible_host: 203.0.113.17
          ansible_user: deploy
        tn6-cb8:
          ansible_host: 203.0.113.18    # REPLACE_ME (expansion slot)
          ansible_user: deploy

        # --- OVH/Kimsufi KS-5 (5 regions) ------------------------------------
        tn6-rbx1:
          ansible_host: 203.0.113.21    # Roubaix, France
          ansible_user: deploy
        tn6-sbg1:
          ansible_host: 203.0.113.22    # Strasbourg, France
          ansible_user: deploy
        tn6-gra1:
          ansible_host: 203.0.113.23    # Gravelines, France
          ansible_user: deploy
        tn6-bhs1:
          ansible_host: 203.0.113.24    # Beauharnois, Canada
          ansible_user: deploy
        tn6-sgp1:
          ansible_host: 203.0.113.25    # Singapore
          ansible_user: deploy

    # -------------------------------------------------------------------------
    # KS-1 seed nodes (always online, low-spec).
    # These are also the bootstrap miners during Phase 2.
    # -------------------------------------------------------------------------
    seeders:
      hosts:
        tn6-ks-seed01:
          ansible_host: 203.0.113.31
          ansible_user: deploy
        tn6-ks-seed02:
          ansible_host: 203.0.113.32
          ansible_user: deploy

    # Bootstrap miners — same physical hosts as seeders.
    # These run one pivxd instance with gen=1 during Phase 2.
    # Once the chain reaches mining_phase_target_height, run:
    #   make stop-bootstrap-mining
    bootstrap_miners:
      hosts:
        tn6-ks-seed01:
        tn6-ks-seed02:

    observers:
      hosts:
        tn6-infra01:
          ansible_host: 203.0.113.41
          ansible_user: deploy

    monitoring:
      hosts:
        tn6-infra01:    # shares host with observer; see host_vars for role split

    # -------------------------------------------------------------------------
    # Provider groups  (used for provider-level chaos targeting)
    # -------------------------------------------------------------------------
    provider_contabo:
      hosts:
        tn6-cb1:
        tn6-cb2:
        tn6-cb3:
        tn6-cb4:
        tn6-cb5:
        tn6-cb6:
        tn6-cb7:
        tn6-cb8:
        tn6-infra01:

    provider_kimsufi:
      hosts:
        tn6-rbx1:
        tn6-sbg1:
        tn6-gra1:
        tn6-bhs1:
        tn6-sgp1:
        tn6-ks-seed01:
        tn6-ks-seed02:

    # -------------------------------------------------------------------------
    # Protocol cohort groups
    # All masternode hosts carry all three cohorts (2 instances each).
    # Cohort targeting controls which instances are touched via per-instance
    # variables; netem rules are applied at the host level.
    # -------------------------------------------------------------------------
    cohort_ipv4:
      children:
        masternodes:
        seeders:

    cohort_ipv6:
      children:
        masternodes:

    cohort_tor:
      children:
        masternodes:

    # -------------------------------------------------------------------------
    # Chaos groups — mirrors of providers for failure injection playbooks
    # -------------------------------------------------------------------------
    chaos_contabo:
      children:
        provider_contabo:

    chaos_kimsufi:
      children:
        provider_kimsufi:
