# host_vars/tn6-seed01.yml
# Contabo seed/bootstrap node and Phase 2 bootstrap miner.
#
# LIFECYCLE ROLE:
#   Phase 2: seed node + bootstrap miner (mining_enabled=true here)
#   Phase 3+: seed-only node (run `make stop-bootstrap-mining` to flip)
#
# This host is in both the `seeders` and `bootstrap_miners` inventory groups.

provider: contabo
chaos_group: chaos_contabo
host_label: tn6-seed01

host_ipv4: "203.0.113.31"           # REPLACE_ME
host_ipv6: "2001:db8:cb::31"        # REPLACE_ME (optional; enable if available)

# Mining reward address for this host during Phase 2.
# Generate with: pivx-cli -testnet getnewaddress "" bech32
bootstrap_mining_address: "REPLACE_ME"  # REPLACE before starting mining

pivx_instances:

  - name: tn6-seed01
    enabled: true
    slot: 0
    protocol_class: ipv4
    cohort: ipv4
    role: seeder
    bind_addr: "{{ host_ipv4 }}"
    external_ip: "{{ host_ipv4 }}"
    p2p_port: 51474
    rpc_port: 51478
    rpc_user: rpc_seed01
    rpc_password: "{{ vault_pivx_rpc_password }}"
    datadir: "/var/lib/pivx/tn6-seed01"
    logdir: "/var/log/pivx/tn6-seed01"
    confdir: "/etc/pivx/tn6-seed01"
    # Lifecycle toggles
    mining_enabled: true         # Phase 2: mine to bootstrap chain
    staking_enabled: false       # flip true in Phase 3
    masternode_enabled: false    # seeders are not masternodes
    bls_operator_key: ""
    extra_conf:
      - "maxconnections=256"
      - "listen=1"
