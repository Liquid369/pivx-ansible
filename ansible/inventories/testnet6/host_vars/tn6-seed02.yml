# host_vars/tn6-seed02.yml
# OVH seed/bootstrap node — second seed intentionally on different provider.
# Also a Phase 2 bootstrap miner (in bootstrap_miners group).

provider: ovh
chaos_group: chaos_ovh
host_label: tn6-seed02

host_ipv4: "203.0.113.32"           # REPLACE_ME
host_ipv6: "2001:db8:ovh::32"       # REPLACE_ME

bootstrap_mining_address: "REPLACE_ME"  # REPLACE before starting mining

pivx_instances:

  - name: tn6-seed02
    enabled: true
    slot: 0
    protocol_class: ipv4
    cohort: ipv4
    role: seeder
    bind_addr: "{{ host_ipv4 }}"
    external_ip: "{{ host_ipv4 }}"
    p2p_port: 51474
    rpc_port: 51478
    rpc_user: rpc_seed02
    rpc_password: "{{ vault_pivx_rpc_password }}"
    datadir: "/var/lib/pivx/tn6-seed02"
    logdir: "/var/log/pivx/tn6-seed02"
    confdir: "/etc/pivx/tn6-seed02"
    mining_enabled: true         # Phase 2: mine to bootstrap chain
    staking_enabled: false
    masternode_enabled: false
    bls_operator_key: ""
    extra_conf:
      - "maxconnections=256"
      - "listen=1"
