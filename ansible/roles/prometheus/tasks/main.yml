---
# roles/prometheus/tasks/main.yml

- name: Set Prometheus version
  ansible.builtin.set_fact:
    _prom_version: "{{ prometheus_version | default('2.50.0') }}"

- name: Create prometheus system user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/prometheus
    create_home: true

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0750"
  loop:
    - /etc/prometheus
    - /etc/prometheus/rules
    - /var/lib/prometheus

- name: Download Prometheus
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ _prom_version }}/prometheus-{{ _prom_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ _prom_version }}.tar.gz"
    # set prometheus_checksum ("sha256:<hash>" from the release sha256sums)
    # to verify the download; empty skips verification
    checksum: "{{ prometheus_checksum | default(omit, true) }}"
    mode: "0644"

- name: Extract Prometheus
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ _prom_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
    creates: "/tmp/prometheus-{{ _prom_version }}.linux-amd64/prometheus"

- name: Install Prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ _prom_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  loop:
    - prometheus
    - promtool

- name: Install default Prometheus consoles
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ _prom_version }}.linux-amd64/{{ item }}"
    dest: "/etc/prometheus/{{ item }}"
    owner: prometheus
    group: prometheus
    remote_src: true
  loop:
    - consoles
    - console_libraries

- name: Write prometheus.yml
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: "0640"
  notify: restart prometheus

- name: Copy alerting rules
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/prometheus/rules/{{ item | basename | regex_replace('\\.j2$', '') }}"
    owner: prometheus
    group: prometheus
    mode: "0640"
  with_fileglob:
    - "../templates/prometheus_rules/*.yml.j2"
  notify: restart prometheus

- name: Install Prometheus systemd unit
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart prometheus

- name: ufw - allow Prometheus (from localhost only by default)
  community.general.ufw:
    rule: allow
    src: "127.0.0.1"
    port: "{{ prometheus_port }}"
    proto: tcp

- name: Enable and start Prometheus
  ansible.builtin.service:
    name: prometheus
    state: started
    enabled: true
