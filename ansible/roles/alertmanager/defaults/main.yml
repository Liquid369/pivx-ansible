---
# roles/alertmanager/defaults/main.yml

alertmanager_version: "0.27.0"
alertmanager_port: 9093

# Discord webhook for alert notifications (team uses Discord/Telegram, not
# Slack). Set here or via vault_alertmanager_discord_webhook in vault.yml.
# Leave empty/REPLACE_ME to disable Discord.
alertmanager_discord_webhook_url: ""

# Telegram bot for alert notifications. Both values must be set to enable.
# Prefer vault_alertmanager_telegram_bot_token / _chat_id in vault.yml.
alertmanager_telegram_bot_token: ""
alertmanager_telegram_chat_id: ""

# How long to hold off sending repeat alerts for the same firing state
alertmanager_repeat_interval: "4h"

# Group alerts by these labels
alertmanager_group_by:
  - alertname
  - host
  - instance
