---
# roles/alertmanager/tasks/main.yml

- name: Set Alertmanager version
  ansible.builtin.set_fact:
    _am_version: "{{ alertmanager_version | default('0.27.0') }}"

- name: Create alertmanager user
  ansible.builtin.user:
    name: alertmanager
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/alertmanager
    create_home: true

- name: Create Alertmanager directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: alertmanager
    group: alertmanager
    mode: "0750"
  loop:
    - /etc/alertmanager
    - /var/lib/alertmanager

- name: Download Alertmanager
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ _am_version }}/alertmanager-{{ _am_version }}.linux-amd64.tar.gz"
    dest: "/tmp/alertmanager-{{ _am_version }}.tar.gz"
    mode: "0644"

- name: Extract Alertmanager
  ansible.builtin.unarchive:
    src: "/tmp/alertmanager-{{ _am_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
    creates: "/tmp/alertmanager-{{ _am_version }}.linux-amd64/alertmanager"

- name: Install Alertmanager binary
  ansible.builtin.copy:
    src: "/tmp/alertmanager-{{ _am_version }}.linux-amd64/alertmanager"
    dest: /usr/local/bin/alertmanager
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Write Alertmanager config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: /etc/alertmanager/alertmanager.yml
    owner: alertmanager
    group: alertmanager
    mode: "0640"
  notify: restart alertmanager

- name: Install Alertmanager systemd unit
  ansible.builtin.template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart alertmanager

- name: Enable and start Alertmanager
  ansible.builtin.service:
    name: alertmanager
    state: started
    enabled: true
