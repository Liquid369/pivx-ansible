---
# roles/pivx_bootstrap_miner/defaults/main.yml

# Mining threads — keep low, testnet difficulty is minimal
bootstrap_mining_threads: 1

# NOTE: there is no mining address option in this build — setgenerate mines
# PoW rewards to the instance's own wallet.

# Whether to start mining immediately after configuration
bootstrap_mining_start_on_deploy: true

# RPC wait retries when checking mining status
bootstrap_mining_rpc_retries: 30
bootstrap_mining_rpc_delay: 10
