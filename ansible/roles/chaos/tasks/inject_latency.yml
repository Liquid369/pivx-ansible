---
# roles/chaos/tasks/inject_latency.yml
# Injects tc/netem latency on the PIVX p2p interface for nodes in the target cohort.
# Called with:
#   netem_delay:   e.g. "200ms"
#   netem_jitter:  e.g. "20ms"  (optional)
#   netem_iface:   e.g. "eth0"  (defaults to ansible_default_ipv4.interface)

- name: Set target interface
  ansible.builtin.set_fact:
    _iface: "{{ netem_iface | default(ansible_default_ipv4.interface) }}"

- name: Ensure iproute2/tc is installed
  ansible.builtin.apt:
    name: iproute2
    state: present

- name: Remove existing qdisc root (ignore error if none)
  ansible.builtin.command: "tc qdisc del dev {{ _iface }} root"
  ignore_errors: true
  changed_when: true

- name: Add netem qdisc with latency"
  ansible.builtin.command: >
    tc qdisc add dev {{ _iface }} root netem
    delay {{ netem_delay | default('100ms') }}
    {{ ('jitter ' + netem_jitter) if netem_jitter is defined else '' }}
  register: tc_result
  changed_when: tc_result.rc == 0

- name: Show applied tc rule
  ansible.builtin.command: "tc qdisc show dev {{ _iface }}"
  register: tc_show
  changed_when: false

- name: Display tc state
  ansible.builtin.debug:
    msg: "{{ tc_show.stdout }}"
