---
# roles/chaos/tasks/inject_loss.yml

- name: Set target interface
  ansible.builtin.set_fact:
    _iface: "{{ netem_iface | default(ansible_default_ipv4.interface) }}"

- name: Remove existing qdisc root (ignore if none)
  ansible.builtin.command: "tc qdisc del dev {{ _iface }} root"
  ignore_errors: true
  changed_when: true

- name: Add netem qdisc with packet loss
  ansible.builtin.command: >
    tc qdisc add dev {{ _iface }} root netem
    loss {{ netem_loss | default('5') }}%
  register: tc_result
  changed_when: tc_result.rc == 0

- name: Show applied tc rule
  ansible.builtin.command: "tc qdisc show dev {{ _iface }}"
  register: tc_show
  changed_when: false

- name: Display tc state
  ansible.builtin.debug:
    msg: "{{ tc_show.stdout }}"
