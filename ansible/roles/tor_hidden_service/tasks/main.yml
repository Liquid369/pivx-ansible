---
# roles/tor_hidden_service/tasks/main.yml
#
# Installs Tor and creates hidden services for each Tor-cohort PIVX instance.
#
# Design: ONE Tor daemon per host, with multiple hidden services.
# This is simpler to manage than per-instance daemons.
#
# After this role runs, it prints all onion addresses.
# You MUST copy these into host_vars/<host>.yml under each Tor instance's
# onion_address field, then re-run `make deploy-pivx` so pivx.conf gets
# the externalip= line updated.
#
# Lifecycle: run `make deploy-tor` before `make deploy-pivx` on first setup.

- name: Install Tor
  ansible.builtin.apt:
    name:
      - tor
      - tor-geoipdb
    state: present
    update_cache: true

- name: Ensure Tor hidden service base directory exists
  ansible.builtin.file:
    path: "{{ tor_hidden_service_base_dir }}"
    state: directory
    owner: "{{ tor_user }}"
    group: "{{ tor_group }}"
    mode: "0700"

- name: Create per-instance hidden service directories
  ansible.builtin.file:
    path: "{{ item.onion_service_dir }}"
    state: directory
    owner: "{{ tor_user }}"
    group: "{{ tor_group }}"
    mode: "0700"
  loop: "{{ pivx_instances | selectattr('protocol_class', 'equalto', 'tor') | selectattr('enabled', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"

- name: Write torrc configuration
  ansible.builtin.template:
    src: torrc.j2
    dest: /etc/tor/torrc
    owner: root
    group: root
    mode: "0644"
  notify: restart tor

- name: Enable and start Tor service
  ansible.builtin.systemd:
    name: tor
    state: started
    enabled: true
    daemon_reload: true

- name: Reload Tor to activate new hidden services
  ansible.builtin.systemd:
    name: tor
    state: reloaded
  changed_when: true

- name: Wait for onion hostname files to appear (up to 60s)
  ansible.builtin.wait_for:
    path: "{{ item.onion_service_dir }}/hostname"
    timeout: 60
  loop: "{{ pivx_instances | selectattr('protocol_class', 'equalto', 'tor') | selectattr('enabled', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"

- name: Read onion hostnames
  ansible.builtin.slurp:
    src: "{{ item.onion_service_dir }}/hostname"
  loop: "{{ pivx_instances | selectattr('protocol_class', 'equalto', 'tor') | selectattr('enabled', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"
  register: onion_hostnames

- name: Display ALL onion addresses — copy these into host_vars!
  ansible.builtin.debug:
    msg: >
      ============================================================
      ONION ADDRESSES FOR {{ inventory_hostname }}
      ============================================================
      {% for result in onion_hostnames.results %}
      {{ result.item.name }}: {{ result.content | b64decode | trim }}
      {% endfor %}
      ------------------------------------------------------------
      NEXT STEP: Add each address to host_vars/{{ inventory_hostname }}.yml
        under the matching instance's `onion_address` field.
      Then run: make deploy-pivx LIMIT={{ inventory_hostname }}
      ============================================================
