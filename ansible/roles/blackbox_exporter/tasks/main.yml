---
# roles/blackbox_exporter/tasks/main.yml
# Installs blackbox_exporter to probe TCP endpoints (PIVX P2P ports).
# Results are scraped by Prometheus to detect unreachable peers.

- name: Check if blackbox_exporter already installed
  ansible.builtin.stat:
    path: /usr/local/bin/blackbox_exporter
  register: bb_bin

- name: Download blackbox_exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/blackbox_exporter/releases/download/v{{ blackbox_exporter_version }}/blackbox_exporter-{{ blackbox_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/blackbox_exporter-{{ blackbox_exporter_version }}.tar.gz"
    # set blackbox_exporter_checksum ("sha256:<hash>") to verify; empty skips
    checksum: "{{ blackbox_exporter_checksum | default(omit, true) }}"
    mode: "0644"
  when: not bb_bin.stat.exists

- name: Extract blackbox_exporter
  ansible.builtin.unarchive:
    src: "/tmp/blackbox_exporter-{{ blackbox_exporter_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
    creates: "/tmp/blackbox_exporter-{{ blackbox_exporter_version }}.linux-amd64/blackbox_exporter"
  when: not bb_bin.stat.exists

- name: Install blackbox_exporter binary
  ansible.builtin.copy:
    src: "/tmp/blackbox_exporter-{{ blackbox_exporter_version }}.linux-amd64/blackbox_exporter"
    dest: /usr/local/bin/blackbox_exporter
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: not bb_bin.stat.exists

- name: Create blackbox-exporter system user
  ansible.builtin.user:
    name: "{{ blackbox_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/blackbox-exporter
    create_home: false

- name: Create blackbox_exporter config directory
  ansible.builtin.file:
    path: /etc/blackbox_exporter
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write blackbox_exporter config
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: /etc/blackbox_exporter/blackbox.yml
    owner: root
    group: root
    mode: "0644"
  notify: restart blackbox-exporter

- name: Write blackbox_exporter systemd unit
  ansible.builtin.template:
    src: blackbox_exporter.service.j2
    dest: /etc/systemd/system/blackbox-exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart blackbox-exporter

- name: Enable and start blackbox_exporter
  ansible.builtin.systemd:
    name: blackbox-exporter
    state: started
    enabled: true
    daemon_reload: true
