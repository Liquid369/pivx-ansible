---
# roles/loki/tasks/main.yml

- name: Set Loki version
  ansible.builtin.set_fact:
    _loki_version: "{{ loki_version | default('2.9.4') }}"

- name: Create loki user
  ansible.builtin.user:
    name: loki
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/loki
    create_home: true

- name: Create Loki directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: loki
    group: loki
    mode: "0750"
  loop:
    - /etc/loki
    - /var/lib/loki
    - /var/lib/loki/chunks
    - /var/lib/loki/index
    - /var/lib/loki/wal
    # referenced by loki.yml.j2 (ruler rules_directory / compactor
    # working_directory) — Loki fails to start without them
    - /var/lib/loki/rules
    - /var/lib/loki/compactor

- name: Download Loki binary
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ _loki_version }}/loki-linux-amd64.zip"
    dest: "/tmp/loki-linux-amd64-{{ _loki_version }}.zip"
    # set loki_checksum ("sha256:<hash>") to verify; empty skips
    checksum: "{{ loki_checksum | default(omit, true) }}"
    mode: "0644"

- name: Extract Loki binary
  ansible.builtin.unarchive:
    src: "/tmp/loki-linux-amd64-{{ _loki_version }}.zip"
    dest: /tmp/
    remote_src: true
    creates: /tmp/loki-linux-amd64

- name: Install Loki binary
  ansible.builtin.copy:
    src: /tmp/loki-linux-amd64
    dest: /usr/local/bin/loki
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Write Loki config
  ansible.builtin.template:
    src: loki.yml.j2
    dest: /etc/loki/loki.yml
    owner: loki
    group: loki
    mode: "0640"
  notify: restart loki

- name: Install Loki systemd unit
  ansible.builtin.template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart loki

# Only fleet hosts push logs — don't expose Loki to the internet.
- name: ufw - allow Loki from fleet hosts only
  community.general.ufw:
    rule: allow
    port: "{{ loki_port }}"
    proto: tcp
    src: "{{ hostvars[item]['ansible_host'] }}"
  loop: "{{ groups['all'] | difference([inventory_hostname]) }}"

- name: Enable and start Loki
  ansible.builtin.service:
    name: loki
    state: started
    enabled: true
