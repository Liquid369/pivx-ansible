---
# roles/grafana/tasks/main.yml

- name: Add Grafana APT key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /etc/apt/keyrings/grafana.gpg
    mode: "0644"

- name: Add Grafana APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main"
    state: present
    filename: grafana

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true

- name: Write Grafana main config
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Create Grafana provisioning directories
  ansible.builtin.file:
    path: "/etc/grafana/provisioning/{{ item }}"
    state: directory
    owner: root
    group: grafana
    mode: "0750"
  loop:
    - datasources
    - dashboards
    - alerting

- name: Write datasources provisioning
  ansible.builtin.template:
    src: grafana_datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/testnet6.yml
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Write dashboard provisioning config
  ansible.builtin.template:
    src: grafana_dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/testnet6.yml
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Create dashboard directory
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0750"

- name: Copy dashboard JSON files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/var/lib/grafana/dashboards/{{ item | basename }}"
    owner: grafana
    group: grafana
    mode: "0640"
  with_fileglob:
    - "files/grafana_dashboards/*.json"
  notify: restart grafana

- name: ufw - allow Grafana (restrict to trusted CIDRs in production)
  community.general.ufw:
    rule: allow
    port: "{{ grafana_port }}"
    proto: tcp

- name: Enable and start Grafana
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true
