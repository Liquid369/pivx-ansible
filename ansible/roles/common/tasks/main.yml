---
# roles/common/tasks/main.yml
# Bootstrap tasks applied to every host in the fleet.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - htop
      - iotop
      - net-tools
      - iproute2
      - ufw
      - fail2ban
      - chrony
      - logrotate
      - lsb-release
      - ca-certificates
      - gnupg
      - python3-pip
      - jq
      - bc
    state: present

- name: Configure chrony (NTP)
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart chrony

- name: Enable and start chrony
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true

- name: Create pivx service group
  ansible.builtin.group:
    name: "{{ pivx_group }}"
    system: true
    state: present

- name: Create pivx service user
  ansible.builtin.user:
    name: "{{ pivx_user }}"
    group: "{{ pivx_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/pivx
    create_home: true
    comment: "PIVX daemon service account"

- name: Create base directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ pivx_user }}"
    group: "{{ pivx_group }}"
    mode: "0750"
  loop:
    - "{{ pivx_base_datadir }}"
    - "{{ pivx_base_logdir }}"
    - "{{ pivx_base_confdir }}"

- name: Configure sysctl for network tuning
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { key: net.core.somaxconn,         value: "1024" }
    - { key: net.ipv4.tcp_max_syn_backlog, value: "1024" }
    - { key: vm.swappiness,               value: "10" }

- name: Disable IPv6 if not needed (skip on IPv6 hosts)
  # IPv6 hosts are identified by having host_ipv6 set - do NOT disable IPv6 there
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.disable_ipv6
    value: "0"      # keep enabled everywhere: IPv6 masternodes need it
    state: present
    reload: true

- name: Configure ufw defaults
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: ufw - allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: ufw - allow PIVX p2p ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ ufw_pivx_ports | default([]) }}"

- name: Configure logrotate for pivx logs
  ansible.builtin.template:
    src: logrotate-pivx.j2
    dest: /etc/logrotate.d/pivx
    owner: root
    group: root
    mode: "0644"

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ host_label }}"

- name: Configure /etc/hosts entry for self
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^127.0.1.1"
    line: "127.0.1.1  {{ host_label }}"
